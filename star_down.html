<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Космический пол</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<script>
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

let stars = [];
let groundedStars = []; // Звезды, которые уже упали
const starCount = 150;
const groundHeight = 50; // Высота зоны "пола"
const connectDistance = 80; // Расстояние для формирования созвездий

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

class Star {
    constructor(isInitial = false) {
        this.reset(isInitial);
    }

    reset(isInitial) {
        this.x = Math.random() * canvas.width;
        // Если это не начальная загрузка, пускаем сверху
        this.y = isInitial ? Math.random() * canvas.height : -10;
        this.size = Math.random() * 2 + 1;
        this.speed = Math.random() * 3 + 1;
        this.opacity = Math.random();
        this.isGrounded = false;
    }

    update() {
        if (!this.isGrounded) {
            this.y += this.speed;
            
            // Проверка достижения пола
            if (this.y >= canvas.height - groundHeight - (Math.random() * 20)) {
                this.isGrounded = true;
                this.y = canvas.height - groundHeight + (Math.random() * 15);
                groundedStars.push(this);
            }
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.shadowBlur = 5;
        ctx.shadowColor = "white";
        ctx.fill();
    }
}

// Инициализация
for (let i = 0; i < starCount; i++) {
    stars.push(new Star(true));
}

function drawConstellations() {
    ctx.beginPath();
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(150, 200, 255, 0.2)';

    for (let i = 0; i < groundedStars.length; i++) {
        for (let j = i + 1; j < groundedStars.length; j++) {
            const dx = groundedStars[i].x - groundedStars[j].x;
            const dy = groundedStars[i].y - groundedStars[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < connectDistance) {
                ctx.moveTo(groundedStars[i].x, groundedStars[i].y);
                ctx.lineTo(groundedStars[j].x, groundedStars[j].y);
            }
        }
    }
    ctx.stroke();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем линии созвездий на полу
    drawConstellations();

    stars.forEach(star => {
        star.update();
        star.draw();
        
        // Если звезда ушла в пол и их стало слишком много, пересоздаем ее сверху
        if (groundedStars.length > 200) {
            const index = groundedStars.indexOf(star);
            if (index > -1) {
                groundedStars.splice(index, 1);
                star.reset(false);
            }
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
  </html>
